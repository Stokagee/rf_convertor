                        }
                      ]
                    },
                    "registrationContact": {
                      "registrationEmail": "john-{{$timestamp}}@email.com",
                      "registrationPhone": "+420123456789"
                    },
                    "personContact": {
                      "emailContact": "john-{{$timestamp}}@personal.com",
                      "phoneContact": "+420987654321"
                    },
                    "addresses": [
                      {
                        "addressType": "RESIDENTIAL",
                        "street": "Oak Avenue 45",
                        "city": "Prague",
                        "zipCode": "12000",
                        "countryCode": "CZ"
                      }
                    ]
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: after-response
                  code: |-
                    if (res.status === 201) {
                      const body = res.getBody();
                      if (body.customerUuid) {
                        bru.setVar("customerUuid", body.customerUuid);
                      }
                      if (body.personUuid) {
                        bru.setVar("personUuid", body.personUuid);
                      }
                    }
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
            docs: |-
