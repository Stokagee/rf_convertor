request:
  headers:
    - name: Content-Type
      value: application/json
  auth:
    type: basic
    username: ''
    password: ''
  scripts:
    - type: before-request
      code: |-
        // --- Internal API: inject JWT cookie ---
        const jwtToken = bru.getVar("jwtToken");
        if (jwtToken) {
          req.setHeader("Cookie", `paymont-jwt-token=${jwtToken}`);
        }

        // --- External API: check OAuth2 token validity ---
        const url = req.getUrl();
        if (url.includes('/api/v1/') && !url.includes('/oauth2/token')) {
          const accessToken = bru.getEnvVar("accessToken");
          if (!accessToken) {
            console.log("WARNING: accessToken is empty. Run 'External/Auth/Get Token.bru' first.");
          } else {
            // Check JWT expiry
            try {
              const payload = JSON.parse(atob(accessToken.split('.')[1]));
              const expiresAt = payload.exp * 1000;
              const remaining = Math.round((expiresAt - Date.now()) / 1000);
              if (remaining <= 0) {
                console.log("WARNING: accessToken EXPIRED. Run 'External/Auth/Get Token.bru' to refresh.");
              } else if (remaining < 300) {
                console.log("WARNING: accessToken expires in", remaining, "s — consider refreshing soon.");
              }
            } catch (e) {
              // non-JWT token (e.g. Ory opaque token) — skip expiry check
            }
          }
        }
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-04-09T17:19:54.730Z'
    exportedUsing: Bruno
