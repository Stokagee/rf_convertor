        items:
          - info:
              name: Create Customer - Entrepreneur
              type: http
              seq: 3
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/customer'
              body:
                type: json
                data: |-
                  {
                    "type": "ENTREPRENEUR",
                    "relationship": "LEND",
                    "riskLevel": "LOW",
                    "customerIdInPlatform": "EXT-ENT-{{$timestamp}}",
                    "naturalPerson": {
                      "firstName": "Jane",
                      "lastName": "Smith",
                      "birthDate": "1985-03-20",
                      "personalIdentificationNumber": "{{pin10}}",
                      "citizenship": "CZ",
                      "gender": "FEMALE",
                      "taxResidences": [{"countryCode": "CZ"}]
                    },
                    "businessProfile": {
                      "typeOfNatural": "ENTREPRENEUR",
                      "businessIdentificationNumber": "{{bin8}}"
                    },
                    "registrationContact": {
                      "registrationEmail": "entrepreneur-{{$timestamp}}@test.cz",
                      "registrationPhone": "+420777999888"
                    },
                    "personContact": {
                      "emailContact": "ent-{{$timestamp}}@test.cz",
                      "phoneContact": "+420777999777"
                    },
                    "addresses": [
                      {
                        "addressType": "RESIDENTIAL",
                        "street": "Home Street 1",
                        "city": "Prague",
                        "zipCode": "11000",
                        "countryCode": "CZ"
                      }
                    ],
                    "naceCodes": ["62.01", "62.02"]
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    // Generate valid CZ birth number: YYMMDD + 3-digit seq + check (full 10-digit number mod 11 == 0)
                    const base = '850320';
                    const ts = Date.now().toString();
                    for (let seq = parseInt(ts.slice(-3)); seq < 999; seq++) {
                      const s = base + String(seq).padStart(3, '0');
                      const n = parseInt(s);
                      const check = n % 11;
                      if (check === 10) continue;
                      const full = s + check;
                      if (parseInt(full) % 11 === 0) {
                        bru.setVar("pin10", full);
                        break;
                      }
                    }
                    // Generate valid ICO
                    const weights = [8, 7, 6, 5, 4, 3, 2];
                    const base7 = ts.slice(-7);
                    let sum = 0;
                    for (let i = 0; i < 7; i++) sum += parseInt(base7[i]) * weights[i];
                    const remainder = sum % 11;
                    let icoCheck;
                    if (remainder === 0) icoCheck = 8;
                    else if (remainder === 1) icoCheck = 0;
                    else icoCheck = 11 - remainder;
                    bru.setVar("bin8", base7 + icoCheck);
                - type: after-response
                  code: |-
                    if (res.status === 201) {
                      const body = res.getBody();
                      if (body.customerUuid) {
                        bru.setVar("customerUuid", body.customerUuid);
                      }
                      if (body.personUuid) {
                        bru.setVar("personUuid", body.personUuid);
                      }
                    }
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
            docs: |-
              # Create Customer - Entrepreneur

              Creates a self-employed (entrepreneur) customer.

              ## Required Fields
              - clientUuid - Parent client UUID
              - type - Must be "ENTREPRENEUR"
              - naturalPerson - Person details
              - businessProfile - Business details (typeOfNatural, businessIdentificationNumber)
