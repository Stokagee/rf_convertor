items:
  - info:
      name: Flows
      type: folder
      seq: 5
    items:
      - info:
          name: Client API Flow
          type: folder
          seq: 2
        request:
          auth: inherit
        items:
          - info:
              name: 03b. Set Customer Active
              type: http
              seq: 5
            http:
              method: PATCH
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}/status'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "status": "ACTIVE"
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      console.log("Customer ACTIVE");
                    } else {
                      console.log("FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Status is ACTIVE", function() {
                      expect(res.getBody().statusName).to.equal("ACTIVE");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 01. Create Customer
              type: http
              seq: 2
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/customer'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "type": "NATURAL",
                    "relationship": "INVEST",
                    "riskLevel": "LOW",
                    "customerIdInPlatform": "EXT-CUST-{{runId}}",
                    "naturalPerson": {
                      "firstName": "Jan",
                      "lastName": "Novak",
                      "birthDate": "1990-05-15",
                      "countryOfBirth": "CZ",
                      "citizenship": "CZ",
                      "gender": "MALE",
                      "taxResidences": [
                        {"countryCode": "CZ"}
                      ]
                    },
                    "registrationContact": {
                      "registrationEmail": "jan-{{runId}}@test.cz",
                      "registrationPhone": "+420777111222"
                    },
                    "personContact": {
                      "emailContact": "jan-{{runId}}@personal.cz",
                      "phoneContact": "+420777333444"
                    },
                    "addresses": [
                      {
                        "addressType": "RESIDENTIAL",
                        "street": "Karlova 5",
                        "city": "Praha",
                        "zipCode": "11000",
                        "countryCode": "CZ"
                      }
                    ]
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    // Always generate fresh runId for unique data
                    bru.setVar("runId", Date.now().toString().slice(-6));
                - type: after-response
                  code: |-
                    if (res.status === 201) {
                      const body = res.getBody();
                      bru.setVar("customerUuid", body.customerUuid);
                      bru.setVar("customerPersonUuid", body.personUuid);
                      console.log("Customer created:", body.customerUuid);
                      console.log("Status:", body.statusName);
                    } else {
                      console.log("FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 201 Created", function() {
                      expect(res.status).to.equal(201);
                    });

                    test("Has customerUuid", function() {
                      expect(res.getBody().customerUuid).to.be.a("string");
                    });

                    test("Status is INITIAL", function() {
                      expect(res.getBody().statusName).to.equal("INITIAL");
                    });

                    test("Type is NATURAL", function() {
                      expect(res.getBody().type).to.equal("NATURAL");
                    });

                    test("clientUuid resolved from cert", function() {
                      expect(res.getBody().clientUuid).to.equal(bru.getEnvVar("clientUuid"));
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 00. Internal Login
              type: http
            http:
              method: POST
              url: '{{baseUrlInternal}}/api/auth/login?username={{username}}&password={{password}}'
              params:
                - name: username
                  value: '{{username}}'
                  type: query
                - name: password
                  value: '{{password}}'
                  type: query
            runtime:
              scripts:
                - type: after-response
                  code: |-
                    if (res.status !== 200) {
                      console.log("LOGIN FAILED!", JSON.stringify(res.getBody()));
                    }

                    const setCookieHeader = res.headers['set-cookie'];
                    if (setCookieHeader) {
                      const cookies = Array.isArray(setCookieHeader) ? setCookieHeader.join('; ') : setCookieHeader;
                      const jwtMatch = cookies.match(/paymont-jwt-token=([^;]+)/);
                      if (jwtMatch) {
                        bru.setVar("jwtToken", jwtMatch[1]);
                        console.log("Internal login OK");
                      }
                    }
                - type: tests
                  code: |-
                    test("Login successful", function() {
                      expect(res.status).to.equal(200);
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 03. Activate Customer
              type: http
              seq: 4
            http:
              method: PATCH
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}/status'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "status": "PENDING_SETUP"
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("customerUuid")) {
                      throw new Error("customerUuid not set");
                    }
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      console.log("Customer -> PENDING_SETUP");
                    } else {
                      console.log("FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Status is PENDING_SETUP", function() {
                      expect(res.getBody().statusName).to.equal("PENDING_SETUP");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 02. Get Customer
              type: http
              seq: 3
            http:
              method: GET
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("customerUuid")) {
                      throw new Error("customerUuid not set - run Create Customer first");
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("customerUuid matches", function() {
                      expect(res.getBody().customerUuid).to.equal(bru.getVar("customerUuid"));
                    });

                    test("Status is INITIAL", function() {
                      expect(res.getBody().statusName).to.equal("INITIAL");
                    });

                    test("Has naturalPerson data", function() {
                      expect(res.getBody().naturalPerson).to.not.be.null;
                    });

                    test("Has address", function() {
                      expect(res.getBody().addresses).to.be.an("array").and.have.length.greaterThan(0);
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 00b. Get OAuth2 Token
              type: http
              seq: 1
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/oauth2/token'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "grantType": "client_credentials",
                    "scope": "read write"
                  }
              auth:
                type: basic
                username: '{{clientId}}'
                password: '{{clientSecret}}'
            runtime:
              scripts:
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      const body = res.getBody();
                      bru.setVar("accessToken", body.accessToken);
                      console.log("OAuth2 token OK, expires in:", body.expiresIn, "s");
                    } else {
                      console.log("OAUTH2 FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Has accessToken", function() {
                      expect(res.getBody().accessToken).to.be.a("string");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 03c. Create Customer Wallet
              type: http
              seq: 6
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}/wallet'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "currencyCode": "EUR",
                    "nickname": "Main EUR Wallet",
                    "walletType": "LIMITED"
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: after-response
                  code: |-
                    if (res.status === 201) {
                      const body = res.getBody();
                      bru.setVar("walletUuid", body.walletUuid);
                      console.log("Wallet created:", body.walletUuid, "|", body.currency, "|", body.status, "|", body.type);
                    } else {
                      console.log("FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 201 Created", function() {
                      expect(res.status).to.equal(201);
                    });

                    test("Has walletUuid", function() {
                      expect(res.getBody().walletUuid).to.be.a("string");
                    });

                    test("Type is LIMITED", function() {
                      expect(res.getBody().type).to.equal("LIMITED");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 04. Get Customer Wallets
              type: http
              seq: 8
            http:
              method: GET
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}/wallets?page=0&size=20'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              params:
                - name: page
                  value: '0'
                  type: query
                - name: size
                  value: '20'
                  type: query
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("customerUuid")) {
                      throw new Error("customerUuid not set");
                    }
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      const body = res.getBody();
                      const wallets = (body.content && Array.isArray(body.content)) ? body.content : [];
                      console.log("Wallets found:", wallets.length);
                      for (let i = 0; i < wallets.length; i++) {
                        const w = wallets[i];
                        console.log("  " + w.currency + " | " + w.walletUuid + " | " + w.status + " | " + w.type);
                      }
                      if (wallets.length > 0) {
                        bru.setVar("walletUuid", wallets[0].walletUuid);
                        console.log("Saved walletUuid:", wallets[0].walletUuid);
                      }
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Has auto-created wallet (LIMITED)", function() {
                      const wallets = res.getBody().content;
                      expect(wallets).to.be.an("array");
                      expect(wallets.length).to.be.greaterThan(0);
                    });

                    test("Wallet is ACTIVE and LIMITED", function() {
                      const w = res.getBody().content[0];
                      expect(w.status).to.equal("ACTIVE");
                      expect(w.type).to.equal("LIMITED");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 03d. Activate Wallet
              type: http
              seq: 7
            http:
              method: PATCH
              url: '{{baseUrlInternal}}/api/person/wallet/{{walletUuid}}/status/ACTIVE'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("walletUuid")) {
                      throw new Error("walletUuid not set");
                    }
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      console.log("Wallet ACTIVE:", bru.getVar("walletUuid"));
                    } else {
                      console.log("FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Wallet is ACTIVE", function() {
                      expect(res.getBody().status).to.equal("ACTIVE");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 08. Charge Wallet (DEBUG)
              type: http
              seq: 12
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/wallet/charge/debug'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "walletUuid": "{{walletUuid}}",
                    "amount": 100000,
                    "scale": 2
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("walletUuid")) {
                      throw new Error("walletUuid not set");
                    }
                - type: after-response
                  code: console.log("Charge response:", res.status, JSON.stringify(res.getBody()));
                - type: tests
                  code: |-
                    test("Charge successful", function() {
                      expect(res.status).to.be.oneOf([200, 201]);
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 06. Create Payment Account
              type: http
              seq: 10
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}/payment-account'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "iban": "DE89370400440532013000",
                    "bic": "COBADEFFXXX",
                    "bankName": "Commerzbank AG",
                    "accountHolderName": "{{recipientFullName}}",
                    "countryCode": "DE",
                    "currencyCode": "EUR",
                    "recipientUuid": "{{recipientUuid}}"
                  }
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("customerUuid")) {
                      throw new Error("customerUuid not set");
                    }
                    if (!bru.getVar("recipientUuid")) {
                      throw new Error("recipientUuid not set - run Get Recipients first");
                    }
                - type: after-response
                  code: |-
                    if (res.status === 201) {
                      const body = res.getBody();
                      bru.setVar("paymentAccountUuid", body.paymentAccountUuid);
                      console.log("Payment account created:", body.paymentAccountUuid);
                      console.log("Status:", body.status, "| isWhitelisted:", body.isWhitelisted);
                    } else {
                      console.log("FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Status 201 Created", function() {
                      expect(res.status).to.equal(201);
                    });

                    test("Has paymentAccountUuid", function() {
                      expect(res.getBody().paymentAccountUuid).to.be.a("string");
                    });

                    test("Status is WHITELIST (LIMITED wallet)", function() {
                      expect(res.getBody().status).to.equal("WHITELIST");
                    });

                    test("isWhitelisted is true", function() {
                      expect(res.getBody().isWhitelisted).to.equal(true);
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 07. Get Wallet Balance
              type: http
              seq: 11
            http:
              method: GET
              url: '{{baseUrl}}/api/v1/wallet/{{walletUuid}}/balance'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              auth:
                type: bearer
                token: '{{accessToken}}'
            runtime:
              scripts:
                - type: before-request
                  code: |-
                    if (!bru.getVar("walletUuid")) {
                      throw new Error("walletUuid not set - run Get Customer Wallets first");
                    }
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      const b = res.getBody();
                      console.log("Total:", b.totalBalance, "| Available:", b.availableBalance, "| Hold:", b.holdBalance);
                    }
                - type: tests
                  code: |-
                    test("Status 200 OK", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Balance fields present", function() {
                      const b = res.getBody();
                      expect(b.totalBalance).to.be.a("number");
                      expect(b.availableBalance).to.be.a("number");
                      expect(b.holdBalance).to.be.a("number");
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: 05. Get Recipients
              type: http
              seq: 9
            http:
              method: GET
              url: '{{baseUrl}}/api/v1/customer/{{customerUuid}}/recipients?page=0&size=20'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              params:
                - name: page
                  value: '0'
                  type: query
                - name: size
                  value: '20'
