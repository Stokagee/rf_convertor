        - name: X-SSL-Client-Cert
          value: '{{clientCert}}'
      auth: inherit
      scripts:
        - type: before-request
          code: |-
            // --- Set Cookie header with JWT token ---
            const token = bru.getVar("jwtToken") || bru.getEnvVar("jwtToken");
            if (token) {
              req.setHeader("Cookie", `paymont-jwt-token=${token}`);
            }
    items:
      - info:
          name: Auth
          type: folder
          seq: 1
        items:
          - info:
              name: Get Token
              type: http
              seq: 1
            http:
              method: POST
              url: '{{baseUrl}}/api/v1/oauth2/token'
              headers:
                - name: X-SSL-Client-Cert
                  value: '{{clientCert}}'
              body:
                type: json
                data: |-
                  {
                    "grantType": "client_credentials",
                    "scope": "read write"
                  }
              auth:
                type: basic
                username: '{{clientId}}'
                password: '{{clientSecret}}'
            runtime:
              scripts:
                - type: after-response
                  code: |-
                    if (res.status === 200) {
                      const body = res.getBody();
                      if (body.accessToken) {
                        bru.setEnvVar("accessToken", body.accessToken);
                        const expiresIn = body.expiresIn || 3600;
                        console.log("Access token saved to env. Expires in:", expiresIn, "seconds");
                      }
                    } else {
                      console.log("GET TOKEN FAILED:", res.status, JSON.stringify(res.getBody()));
                    }
                - type: tests
                  code: |-
                    test("Token obtained successfully", function() {
                      expect(res.status).to.equal(200);
                    });

                    test("Access token present", function() {
                      const body = res.getBody();
                      expect(body.accessToken).to.be.a('string');
                    });
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
            docs: |-
              # OAuth2 - Get Token

              Obtain an OAuth2 access token using Client Credentials grant.

              ## Requirements
              - Valid client certificate (mTLS) — configured in bruno.json
              - HTTP Basic Auth with client credentials (clientId + clientSecret from env)
              - X-SSL-Client-Cert header (clientCert from env)

              ## Response
              - accessToken - JWT access token
              - tokenType - "Bearer"
              - expiresIn - Token lifetime in seconds (default 3600)
              - scope - Granted scopes

              ## Token auto-refresh
              The collection pre-request script auto-refreshes the token for /api/v1/ requests
              when it is missing or expired. This test can also be run manually to force a refresh.
