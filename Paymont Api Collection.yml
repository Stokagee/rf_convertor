            docs: |-
              # Update Payment Account Status

              Updates the status of a payment account.
              Validates ownership (account must belong to the customer in the URL).
              Enforces wallet-type-specific transition rules.

              ## STANDARD wallet transitions
              - PENDING_VERIFICATION -> VERIFIED | BLOCKED
              - VERIFIED -> BLOCKED
              - BLOCKED -> PENDING_VERIFICATION

              ## LIMITED wallet transitions
              - WHITELIST -> BLOCKED
              - BLOCKED -> WHITELIST

