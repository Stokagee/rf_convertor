name: Sample API Collection
version: "1.0"
baseUrl: https://api.example.com
variables:
  baseUrl: https://api.example.com
  apiKey:
    value: secret-key-123
    secret: true
auth:
  type: bearer
  token: "{{bearerToken}}"
folders:
  - name: Users
    path: /users
    requests:
      - info:
          name: List Users
          type: http
          seq: 1
        http:
          method: GET
          url: https://api.example.com/users
          params:
            page: "1"
            limit: "10"
      - info:
          name: Get User
          type: http
          seq: 2
        http:
          method: GET
          url: https://api.example.com/users/1
  - name: Products
    path: /products
    requests:
      - info:
          name: List Products
          type: http
          seq: 1
        http:
          method: GET
          url: https://api.example.com/products
requests:
  - info:
      name: Health Check
      type: http
      seq: 1
    http:
      method: GET
      url: https://api.example.com/health
