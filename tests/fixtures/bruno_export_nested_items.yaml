opencollection: 1.0.0
info:
  name: Paymont Api Collection
config:
  environments:
    - name: devel
      variables:
        - name: baseUrl
          value: https://api.example.com
        - name: clientId
          value: test-client
        - name: clientSecret
          value: test-secret
items:
  - info:
      name: Flows
      type: folder
      seq: 1
    items:
      - info:
          name: Client API Flow
          type: folder
          seq: 1
        items:
          - info:
              name: Get OAuth2 Token
              type: http
              seq: 1
            http:
              method: POST
              url: "{{baseUrl}}/api/v1/oauth2/token"
              headers:
                - name: X-Test-Header
                  value: enabled
              body:
                type: json
                data: |-
                  {
                    "grantType": "client_credentials",
                    "scope": "read write"
                  }
              auth:
                type: basic
                username: "{{clientId}}"
                password: "{{clientSecret}}"
          - info:
              name: List Customers
              type: http
              seq: 2
            http:
              method: GET
              url: "{{baseUrl}}/api/v1/customer"
              params:
                - name: page
                  value: "0"
                  type: query
                  disabled: true
                - name: size
                  value: "20"
                  type: query
              auth:
                type: bearer
                token: "{{accessToken}}"
  - info:
      name: Health Check
      type: http
      seq: 2
    http:
      method: GET
      url: "{{baseUrl}}/health"
